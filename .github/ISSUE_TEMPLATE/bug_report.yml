name: Report a bug
description: File a bug report
labels: ["Bug"]
body:
  - type: markdown
    attributes:
      value: |
        Write your bug report as a clear prompt that an AI agent can act on. Focus on observable behavior, steps to reproduce, and expected outcome.
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info (leave empty if we should use your GitHub profile)?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Describe the bug as if you are instructing an AI to investigate and fix it.
      value: |
        **What happens?**
        When I [do X], [Y happens] instead of [expected Z].

        **Steps to reproduce**
        1. ...
        2. ...
        3. ...

        **Error messages or logs**
        ...
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      multiple: false
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: checkboxes
    id: security-related
    attributes:
      label: Is this bug security related?
      description: Please let us know if this bug is security related. If so please consider using our [Report a security vulnerability](https://github.com/platformplatform/PlatformPlatform/security/advisories/new) form instead.
      options:
        - label: This bug is related to security
          required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/platformplatform/PlatformPlatform/blob/main/.github/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
