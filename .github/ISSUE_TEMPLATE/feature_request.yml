name: Add a feature request
description: Suggest an idea for this project
labels: ["Enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Write your feature request as a clear prompt that an AI agent can act on. Focus on the problem, desired outcome, and any constraints.
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info (leave empty if we should use your GitHub profile)?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: Describe the feature as if you are instructing an AI to implement it.
      value: |
        **Problem**
        What problem does this solve or what need does it address?

        **Desired behavior**
        What should happen when this feature is implemented?

        **Constraints or considerations**
        Any technical constraints, design preferences, or edge cases to keep in mind.
    validations:
      required: true
  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      multiple: true
      options:
        - .NET
        - Infrastructure
        - DevOps
        - Reference example
        - Technology
        - Other
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/platformplatform/PlatformPlatform/blob/main/.github/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
